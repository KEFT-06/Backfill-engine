services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: backfill
      POSTGRES_PASSWORD: backfill
      POSTGRES_DB: backfill
    ports:
      # Host 5433 (not 5432) to avoid clashing with a native PostgreSQL install on Windows.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backfill -d backfill"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - miniodata:/data

  # One-shot: waits for MinIO, then creates the target bucket. Exits 0.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio...'; sleep 1; done;
      mc mb --ignore-existing local/backfill;
      echo 'bucket ready';
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
